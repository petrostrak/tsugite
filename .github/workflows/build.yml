name: Build Tsugite for macOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
    
    - name: Install system dependencies
      run: |
        brew update
        brew install gcc  # For numpy compilation
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip wheel setuptools
        
        # Install PyQt5 first (has pre-built wheels)
        pip install PyQt5==5.15.4
        
        # Install numpy with specific configuration for ARM64
        pip install numpy==1.20.3 --no-binary=numpy
        
        # Install the rest
        pip install multipledispatch==0.6.0
        pip install Pillow==8.3.2
        pip install PyOpenGL==3.1.5
        pip install pyrr==0.10.3
        pip install six==1.15.0
        
        pip install pyinstaller
    
    - name: Build with PyInstaller
      run: |
        cd setup
        export MACOSX_DEPLOYMENT_TARGET=13.0
        pyinstaller --onefile --windowed --name Tsugite tsugite_app.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Tsugite-macOS
        path: setup/dist/Tsugite.app