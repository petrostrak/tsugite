name: Build Tsugite for macOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
    
    - name: Install system dependencies
      run: |
        brew update
        brew install qt5
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip wheel setuptools
        
        # Install PyQt5 from pre-built wheel first
        pip install --only-binary :all: PyQt5 PyQt5-sip PyQt5-Qt5
        
        # Install remaining requirements, excluding PyQt5
        grep -v "PyQt5" requirements.txt | xargs pip install
        
        pip install pyinstaller
    
    - name: Build with PyInstaller
      run: |
        cd setup
        export MACOSX_DEPLOYMENT_TARGET=13.0
        pyinstaller --onefile --windowed --name Tsugite tsugite_app.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Tsugite-macOS
        path: setup/dist/Tsugite.app